# ============================================================
# SECRETS (sensitive values from .env — base64 encoded)
# JWT_ACCESS_SECRET:  fsa-access-secret-super-secure-key-32chars!!
# JWT_REFRESH_SECRET: fsa-refresh-secret-super-secure-key-32chars!
# POSTGRES_USER:      fsa_user
# POSTGRES_PASSWORD:  fsa_password
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  JWT_ACCESS_SECRET: ZnNhLWFjY2Vzcy1zZWNyZXQtc3VwZXItc2VjdXJlLWtleS0zMmNoYXJzISE=
  JWT_REFRESH_SECRET: ZnNhLXJlZnJlc2gtc2VjcmV0LXN1cGVyLXNlY3VyZS1rZXktMzJjaGFycyE=
  POSTGRES_USER: ZnNhX3VzZXI=
  POSTGRES_PASSWORD: ZnNhX3Bhc3N3b3Jk

---
# ============================================================
# CONFIGMAP (non-sensitive values from .env / docker-compose)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  NODE_ENV: "development"
  PORT: "4000"
  POSTGRES_DB: "fsa_db"
  DATABASE_URL: "postgresql://fsa_user:fsa_password@postgres-service:5432/fsa_db"
  TEST_DATABASE_URL: "postgresql://fsa_user:fsa_password@postgres-service:5432/fsa_test_db"
  REDIS_URL: "redis://redis-service:6379"
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  EXPORTS_DIR: "./exports"
  FRONTEND_URL: "http://minikube-ip:30003"

---
# ============================================================
# POSTGRES — PersistentVolumeClaim
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ============================================================
# POSTGRES — Deployment
# mirrors: image: postgres:16-alpine + POSTGRES_* env from .env
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U fsa_user -d fsa_db"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U fsa_user -d fsa_db"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# ============================================================
# POSTGRES — Service (ClusterIP, internal only)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# ============================================================
# REDIS — PersistentVolumeClaim
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi

---
# ============================================================
# REDIS — Deployment
# mirrors: image: redis:7-alpine
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc

---
# ============================================================
# REDIS — Service (ClusterIP, internal only)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# ============================================================
# BACKEND — PersistentVolumeClaim (exports volume)
# mirrors: ./backend/exports:/app/exports
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: exports-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi

---
# ============================================================
# BACKEND — Deployment
# mirrors: build context ./backend, port 4000
# command: prisma generate + db push + npm run dev
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Waits for Postgres to be ready before backend starts
        # mirrors: depends_on postgres condition: service_healthy
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-service -U fsa_user -d fsa_db; do
                echo "Waiting for postgres..."; sleep 2;
              done
        # Waits for Redis to be ready before backend starts
        # mirrors: depends_on redis condition: service_healthy
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis-service ping | grep PONG; do
                echo "Waiting for redis..."; sleep 2;
              done
      containers:
        - name: backend
          image: jira_backend:latest   # replace with your image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          # mirrors: command in docker-compose
          command:
            - sh
            - -c
            - |
              npx prisma generate --schema=src/models/schema.prisma &&
              npx prisma db push --schema=src/models/schema.prisma &&
              npm run dev
          volumeMounts:
            - name: exports-storage
              mountPath: /app/exports
      volumes:
        - name: exports-storage
          persistentVolumeClaim:
            claimName: exports-pvc

---
# ============================================================
# BACKEND — Service (NodePort, mirrors port 4000)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30001
  type: NodePort

---
# ============================================================
# FRONTEND — Deployment
# mirrors: build context ./frontend, port 5173
# NOTE: VITE_* vars are baked at BUILD TIME via Dockerfile ARG.
#       The env value below is informational only; pass it as
#       --build-arg VITE_API_URL=http://192.168.49.2:30001/api
#       when building the frontend Docker image.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: jira_frontend:latest   # replace with your image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            # Runtime hint only — VITE vars must be injected at build time
            - name: VITE_API_URL
              value: "http://minikube-ip:30001/api"

---
# ============================================================
# FRONTEND — Service (NodePort, mirrors port 5173)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30003
  type: NodePort
